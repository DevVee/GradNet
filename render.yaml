## render.yaml — GradNet Laravel 12 on Render.com (Docker)
## Docs: https://render.com/docs/render-yaml
##
## Deployment flow:
##   1. Render builds the Docker image (Dockerfile) — compiles Vite assets + installs PHP deps
##   2. Container starts → docker/start.sh runs migrations, caches config, boots nginx + php-fpm
##
## Database : External Supabase PostgreSQL (Singapore region)
## Runtime  : Docker (nginx + php-fpm + supervisor) — same stack as Clinovia
## Storage  : Render ephemeral disk (files lost on redeploy — use S3/R2 for persistence)
##
## ⚠️  Before first deploy — set these in Render Dashboard → Environment:
##   APP_KEY       → run locally: php artisan key:generate --show
##   DB_HOST       → from Supabase: Settings → Database → Host
##   DB_PASSWORD   → Supabase DB password
##   DB_USERNAME   → postgres (or your Supabase user)
##   VAPID_PUBLIC_KEY  → copy from your local .env
##   VAPID_PRIVATE_KEY → copy from your local .env  (keep as Secret)

services:
  - type: web
    name: gradnet
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free

    envVars:
      # ── App ─────────────────────────────────────────────────────────────────
      - key: APP_NAME
        value: GradNet
      - key: APP_ENV
        value: production
      - key: APP_KEY
        # IMPORTANT: Do NOT use generateValue — it creates a new key on every
        # deploy, invalidating all sessions and CSRF tokens (→ 419 errors).
        # Generate once:  php artisan key:generate --show
        # Then paste the base64:... value here or set it in Render Dashboard.
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        # Update to your actual Render service URL after first deploy
        value: "https://gradnet.onrender.com"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # ── Database (Supabase PostgreSQL — Transaction Pooler) ──────────────────
      # Get these from: Supabase Dashboard → Settings → Database → Connection info
      # Use the "Transaction pooler" host (port 6543) for serverless/PaaS deploys.
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false              # e.g. aws-0-ap-southeast-1.pooler.supabase.com
      - key: DB_PORT
        value: "6543"            # Transaction pooler port (use 5432 for direct)
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        sync: false              # e.g. postgres.abcdefghijklmnop
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require

      # ── Session / Cache / Queue ───────────────────────────────────────────────
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "480"             # 8-hour session (matches a full school/work day)
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

      # ── Storage ───────────────────────────────────────────────────────────────
      # "public" means storage/app/public symlinked to public/storage.
      # NOTE: Render's ephemeral filesystem loses uploads on each redeploy.
      # For persistent uploads (profile pics, post media) switch to S3/R2:
      #   FILESYSTEM_DISK=s3  + AWS_* credentials
      - key: FILESYSTEM_DISK
        value: public

      # ── Mail ──────────────────────────────────────────────────────────────────
      - key: MAIL_MAILER
        value: log               # Change to smtp in production when mail is ready
      - key: MAIL_FROM_ADDRESS
        value: "noreply@gradnet.app"
      - key: MAIL_FROM_NAME
        value: GradNet

      # ── Web Push Notifications (VAPID) ────────────────────────────────────────
      # Copy from your local .env (generated with: php artisan alumni:vapid-generate)
      # Keep VAPID_PRIVATE_KEY as a Secret in Render Dashboard.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: "mailto:noreply@gradnet.app"
