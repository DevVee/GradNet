# GradNet — Render deployment (SQLite, Docker, free tier)
# Docs: https://render.com/docs/blueprint-spec
#
# Demo credentials (seeded at Docker build time):
#   Admin : admin@gradnet.ph  /  password
#   Users : *@demo.gradnet.ph /  password   ← alumni demo accounts
#
# ── IMPORTANT: APP_KEY ────────────────────────────────────────────────────────
# This key is stable — it was generated once locally and must never change.
# Changing it invalidates all active sessions and CSRF tokens (→ 419 errors).
# To rotate: generate a new key with `php artisan key:generate --show`,
# update this value, and expect all logged-in users to be signed out.
#
# ── IMPORTANT: APP_URL ────────────────────────────────────────────────────────
# After creating the Render service, update APP_URL to your actual service URL
# (e.g. https://gradnet.onrender.com). Wrong APP_URL breaks asset loading and
# redirects.

services:
  - type: web
    name: gradnet
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /up

    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      # App
      - key: APP_NAME
        value: GradNet
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"

      # Stable APP_KEY — do NOT replace with generateValue: true
      - key: APP_KEY
        value: "base64:o7YSOYxYREgYuFyljWGdR72AZymlAQcyerIY3A9Zz0c="

      # Update this to your actual Render service URL after first deploy
      - key: APP_URL
        value: "https://gradnet.onrender.com"

      - key: APP_TIMEZONE
        value: Asia/Manila

      # Database — SQLite lives in the container; resets on each new deploy
      - key: DB_CONNECTION
        value: sqlite

      # Session
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "480"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: SESSION_ENCRYPT
        value: "true"

      # Cache / Queue
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

      # Logging — stderr so Render captures it in the log stream
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # Trust Render's load-balancer proxy
      - key: TRUST_PROXIES
        value: "*"

      # Bcrypt cost (lower = faster login on free tier's shared CPU)
      - key: BCRYPT_ROUNDS
        value: "10"

      # Storage — ephemeral public disk (uploads lost on redeploy)
      # For persistent uploads switch to S3/R2 and set FILESYSTEM_DISK=s3
      - key: FILESYSTEM_DISK
        value: public

      # Mail — log only for demo; set to smtp when ready
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: "noreply@gradnet.app"
      - key: MAIL_FROM_NAME
        value: GradNet

      # Web Push Notifications (VAPID)
      # Copy from your local .env — keep VAPID_PRIVATE_KEY as a Secret
      - key: VAPID_PUBLIC_KEY
        value: "BLSRjdzlY2_LKBfDBRQN1Sc3YdCKWun6aGgb2AWCr22VjxObQPUHshrHCnkljRhPfZZtonj1vBmOMMNzyiyHDxw"
      - key: VAPID_PRIVATE_KEY
        sync: false          # Set this as a Secret in Render Dashboard
      - key: VAPID_SUBJECT
        value: "mailto:noreply@gradnet.app"

# ── Keep-alive cron job ───────────────────────────────────────────────────────
# Pings the web service every 10 minutes so Render free tier never sleeps.
# Render sleeps after 15 min of inactivity; 10 min gives comfortable headroom.
  - type: cron
    name: gradnet-keepalive
    runtime: image
    image:
      url: docker.io/curlimages/curl:8
    region: singapore
    schedule: "*/10 * * * *"
    startCommand: curl -sf --max-time 15 "https://${PING_HOST}/up" || true
    envVars:
      - key: PING_HOST
        fromService:
          name: gradnet
          type: web
          property: host
