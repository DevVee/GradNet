<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dde3ee"/>
      <stop offset="100%" style="stop-color:#c8d0e0"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="50" cy="36" r="17" fill="#8fa0bb"/>
  <!-- Body / shoulders -->
  <ellipse cx="50" cy="82" rx="28" ry="22" fill="#8fa0bb" clip-path="url(#circle)"/>
</svg>
